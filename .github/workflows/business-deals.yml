name: Business Deals Scanner

on:
  schedule:
    # 每 45 分鐘執行一次
    - cron: '*/45 * * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  scan-business-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run business deals scanner
        env:
          NODE_ENV: production
          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
          # APIs
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          SCRAPERAPI_API_KEYS: ${{ secrets.SCRAPERAPI_API_KEYS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # Notifications
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # RSS & Business Logic
          RSS_FEED_URLS: ${{ secrets.RSS_FEED_URLS }}
          BUSINESS_DEAL_THRESHOLD_GBP: ${{ secrets.BUSINESS_DEAL_THRESHOLD_GBP }}
          # BUSINESS_DEAL_MIN_CONFIDENCE has default value 0.8 in env.ts
          # Scheduler
          SCHEDULER_LEASE_DURATION_MS: ${{ secrets.SCHEDULER_LEASE_DURATION_MS }}
        run: npm run job:business-deals
